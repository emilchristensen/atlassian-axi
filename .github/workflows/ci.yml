name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm run typecheck
      - run: pnpm test

      # SKILL.md is a published artifact generated from src/skill.ts. Fail the
      # build when a committed copy has drifted, so agents never receive stale
      # command docs. Fix by running `pnpm run build:skill` and committing.
      - run: pnpm run build:skill -- --check
