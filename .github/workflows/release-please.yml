name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: ${{ steps.release.outputs.release_created }}

      - run: pnpm run build
        if: ${{ steps.release.outputs.release_created }}

      - run: npm publish --access public --provenance
        if: ${{ steps.release.outputs.release_created }}
        env:
          # OIDC trusted publishing can't be pre-configured for a package that
          # doesn't exist yet, so the FIRST publish needs a token. Set the
          # NPM_TOKEN repo secret to a granular token allowed to create the
          # package; leave it unset to fall back to trusted publishing once the
          # package exists and a trusted publisher is configured on npmjs.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
