name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.releases_created }}

      - uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs.releases_created }}

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.releases_created }}
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: ${{ steps.release.outputs.releases_created }}

      - run: pnpm run build
        if: ${{ steps.release.outputs.releases_created }}

      # Publish every package release-please just tagged, from its own dir.
      # tsup bundles @atlassian-axi/core in, so each published package is
      # self-contained. OIDC provenance is used; NPM_TOKEN is the fallback for
      # the FIRST publish of a package that has no trusted publisher yet.
      - name: Publish released packages
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          for dir in $(echo '${{ steps.release.outputs.paths_released }}' | jq -r '.[]'); do
            echo "Publishing $dir"
            (cd "$dir" && npm publish --access public --provenance)
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
