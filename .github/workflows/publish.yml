name: publish

# Manual publish of a single package to npm via TRUSTED PUBLISHING (OIDC).
# Use when a package's version is already bumped on main + tagged (e.g. by
# release-please) but the automated publish did not run/complete. Requires a
# trusted publisher for the package on npmjs.com (org emilchristensen, repo
# atlassian-axi, workflow publish.yml). No token; provenance is automatic.
# Builds from main and publishes whatever version is in the package's
# package.json.

on:
  workflow_dispatch:
    inputs:
      package_dir:
        description: "Package directory to publish"
        required: true
        type: choice
        options:
          - packages/jira-axi
          - packages/confluence-axi

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      # Trusted publishing (OIDC) needs npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Publish ${{ inputs.package_dir }}
        run: cd "${{ inputs.package_dir }}" && npm publish --access public
